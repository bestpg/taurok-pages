---
# Ansible playbook — provision / verify the Cloudflare Pages project from the
# encrypted vault. Run:  ansible-playbook deploy.yml
# (ansible.cfg points at .vault_pass so it decrypts automatically.)
- name: Provision Cloudflare Pages (taurok)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - group_vars/all/vault.yml
  tasks:
    - name: Verify Cloudflare root token
      ansible.builtin.uri:
        url: https://api.cloudflare.com/client/v4/user
        headers:
          X-Auth-Email: "{{ cloudflare_email }}"
          X-Auth-Key: "{{ cloudflare_api_token }}"
        status_code: 200
      register: cf_verify

    - name: Look up account id
      ansible.builtin.uri:
        url: https://api.cloudflare.com/client/v4/accounts
        headers:
          X-Auth-Email: "{{ cloudflare_email }}"
          X-Auth-Key: "{{ cloudflare_api_token }}"
      register: cf_accounts

    - name: Set account id
      ansible.builtin.set_fact:
        cf_account_id: "{{ cf_accounts.json.result[0].id }}"

    - name: Ensure Pages project exists
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/accounts/{{ cf_account_id }}/pages/projects"
        method: POST
        headers:
          X-Auth-Email: "{{ cloudflare_email }}"
          X-Auth-Key: "{{ cloudflare_api_token }}"
        body_format: json
        body:
          name: "{{ cloudflare_pages_project }}"
          production_branch: main
        status_code: [200, 409]   # 409 = already exists (idempotent)
      register: cf_pages

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          Pages project '{